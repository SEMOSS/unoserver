apiVersion: apps/v1
kind: Deployment
metadata:
  name: unoserver
  labels: { app: unoserver }
spec:
  replicas: 2
  selector:
    matchLabels: { app: unoserver }
  template:
    metadata:
      labels: { app: unoserver }
    spec:
      containers:
        - name: unoserver
          image: container.semoss.org/genai/unoserver:latest
          ports:
            - containerPort: 8080
          resources:
            requests: { cpu: "250m", memory: "512Mi" }
            limits:   { cpu: "1",    memory: "1Gi" }
          readinessProbe:
            httpGet: { path: /health, port: 8080 }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /health, port: 8080 }
            initialDelaySeconds: 15
            periodSeconds: 20
          volumeMounts:
            - { name: dshm, mountPath: /dev/shm }
            - { name: home, mountPath: /tmp/lo-home }
      volumes:
        - name: dshm
          emptyDir: { medium: Memory, sizeLimit: 256Mi }
        - name: home
          emptyDir: {}