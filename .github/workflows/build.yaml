name: Build Docker image

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  workflow_dispatch:

env:
  IMAGE_NAME: genai/unoserver

jobs:
  build-and-push:
    name: Build and push
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set date environment variable
        run: echo "date=$(date '+%Y-%m-%d-%H%M')" >> $GITHUB_ENV

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.DOCKER_CONTAINER_SEMOSS }}
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASS }}

      - name: Build and push Docker image
        run: |
          IMAGE="${{ vars.DOCKER_CONTAINER_SEMOSS }}/${IMAGE_NAME}:${{ env.date }}"
          LATEST="${{ vars.DOCKER_CONTAINER_SEMOSS }}/${IMAGE_NAME}:latest"

          echo "Building Docker image: $IMAGE"
          docker build -t "$IMAGE" .

          docker tag "$IMAGE" "$LATEST"

          docker push "$IMAGE"
          docker push "$LATEST"

          echo "Successfully built and pushed $IMAGE and $LATEST"
